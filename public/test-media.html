<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba de Media - G-Chat Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .test-container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .test-card { padding: 30px; }
    .test-card h2 { margin-top: 0; }
    .preview-area { margin: 15px 0; }
    .preview-area img, .preview-area video { max-width: 100%; max-height: 300px; border-radius: 8px; }
    .result-area { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 15px; white-space: pre-wrap; margin-top: 15px; display: none; }
    .loading { display: none; text-align: center; padding: 20px; }
    .loading.active { display: block; }
    .back-link { margin-bottom: 20px; display: block; }
  </style>
</head>
<body>
  <div class="test-container">
    <a href="/" class="back-link text-muted">&larr; Volver al Dashboard</a>
    <div class="glass-panel test-card">
      <h2><i class="fa-solid fa-flask text-purple"></i> Prueba con imágenes y videos</h2>
      <p class="text-muted">Sube una foto o video, escribe una pregunta, o ambos. El bot analizará todo junto con los documentos del Drive.</p>

      <form id="test-form">
        <div class="input-group">
          <label for="question">Texto (opcional)</label>
          <textarea id="question" rows="3" placeholder="Describe el problema o error que ves en la imagen/video..." style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.2);color:#fff;"></textarea>
        </div>

        <div class="input-group" style="margin-top:15px;">
          <label for="file">Archivo (imagen o video)</label>
          <input type="file" id="file" accept="image/*,video/*" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.2);color:#fff;">
          <div class="preview-area" id="preview"></div>
        </div>

        <button type="submit" class="btn btn-gradient btn-block" style="margin-top:15px;">
          <i class="fa-solid fa-paper-plane"></i> Enviar para análisis
        </button>
      </form>

      <div class="loading" id="loading">
        <i class="fa-solid fa-spinner fa-spin fa-2x text-purple"></i>
        <p class="text-muted">Analizando archivo y consultando documentación...</p>
      </div>

      <div class="result-area" id="result"></div>
    </div>
  </div>

  <script>
    const password = localStorage.getItem('adminPassword');
    if (!password) { window.location.href = '/'; }

    document.getElementById('file').addEventListener('change', function() {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';
      if (this.files && this.files[0]) {
        const file = this.files[0];
        const url = URL.createObjectURL(file);
        if (file.type.startsWith('video/')) {
          preview.innerHTML = `<video controls src="${url}"></video>`;
        } else {
          preview.innerHTML = `<img src="${url}" alt="Preview">`;
        }
      }
    });

    document.getElementById('test-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData();
      const question = document.getElementById('question').value;
      const file = document.getElementById('file').files[0];

      if (!question && !file) { alert('Debes escribir algo o seleccionar un archivo.'); return; }

      if (question) formData.append('question', question);
      if (file) formData.append('file', file);

      document.getElementById('loading').classList.add('active');
      document.getElementById('result').style.display = 'none';

      try {
        const response = await fetch('/api/admin/test-media', {
          method: 'POST',
          headers: { 'x-admin-password': password },
          body: formData
        });

        document.getElementById('loading').classList.remove('active');

        if (response.ok) {
          const data = await response.json();
          const resultDiv = document.getElementById('result');
          resultDiv.textContent = data.answer;
          resultDiv.style.display = 'block';
        } else {
          const err = await response.json();
          alert('Error: ' + (err.error || 'Error desconocido'));
        }
      } catch (err) {
        document.getElementById('loading').classList.remove('active');
        alert('Error de conexión: ' + err.message);
      }
    });
  </script>
</body>
</html>
